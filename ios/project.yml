name: XrealPOC
options:
  bundleIdPrefix: io.github.kevinfitzroy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# 显式 **共享** app scheme(shared,跨 regenerate 稳定)→ Xcode 默认就选它跑整个 app
# (含内嵌的 ShareExtension + RecordingWidget extension)。避免手滑选到 RecordingWidget scheme:
# 那个 widget 只有 Live Activity、没主屏小组件,单跑会报「Failed to show Widget」(Code=8)。
schemes:
  Agent Deck:
    build:
      targets:
        XrealPOC: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.12.0"
  # 原生终端模拟器(xterm.js 的 iOS 等价)。WKWebView 收不到硬件键 + 软键盘抑制的死结 → 改用它,
  # 键盘全原生正确处理(硬件键/修饰/DECCKM)。它是 La Terminal 的开源内核,底层同样 swift-nio-ssh。
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

targets:
  XrealPOC:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      # Asset catalog holds AppIcon (1024 universal; Xcode generates the rest). Compiled
      # into Assets.car → app launcher icon = the same `>_` terminal-prompt mark as Android.
      - path: App/Assets.xcassets
      # web/ as a FOLDER REFERENCE (blue folder) so index.html's relative src/href +
      # @font-face url() resolve, and allowingReadAccessTo: can grant the whole dir.
      # buildPhase: resources puts it in the Copy Bundle Resources phase.
      - path: App/web
        type: folder
        buildPhase: resources
      # 共享音频收件箱(App Group)—— 主 app 与 ShareExtension 都编译这一份。
      - path: Shared
      # Live Activity 属性 —— 主 app 与 RecordingWidget extension 都编译这一份(类型须一致)。
      - path: SharedLive
    dependencies:
      - package: Citadel
      - package: SwiftTerm
      # 付费开发者账号后恢复(App ID 名额不再受限)。
      # ShareExtension = 分享音频进 app(会议纪要链路);RecordingWidget = 锁屏/灵动岛录音 Live Activity。
      - target: ShareExtension
      - target: RecordingWidget
    postBuildScripts:
      - name: Stamp Git revision
        script: |
          set -e
          INFO_PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          GIT_ROOT="$(git -C "$PROJECT_DIR" rev-parse --show-toplevel 2>/dev/null || true)"
          GIT_REV="unknown"
          if [ -n "$GIT_ROOT" ]; then
            GIT_REV="$(git -C "$GIT_ROOT" rev-parse --short HEAD 2>/dev/null || echo unknown)"
          fi
          /usr/libexec/PlistBuddy -c "Set :AgentStationGitRevision $GIT_REV" "$INFO_PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :AgentStationGitRevision string $GIT_REV" "$INFO_PLIST"
      - name: Embed optional Singboxbridge
        script: |
          set -e
          SRC="$PROJECT_DIR/App/Frameworks/Singboxbridge.framework"
          if [ ! -d "$SRC" ]; then
            echo "Singboxbridge.framework absent; SSH-over-443 proxy hosts will fail closed."
            exit 0
          fi
          DST="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
          mkdir -p "$DST"
          rsync -a --delete "$SRC" "$DST/"
          if [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ] && [ "${CODE_SIGNING_ALLOWED:-NO}" != "NO" ]; then
            /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --preserve-metadata=identifier,entitlements "$DST/Singboxbridge.framework"
          fi
    # 版本号放进 Version.xcconfig; DEVELOPMENT_TEAM 放进 gitignored Signing.xcconfig —— 不让个人 Apple ID team 进公开 repo。
    # 真机构建需本地有 ios/Signing.xcconfig(内含 `DEVELOPMENT_TEAM = <你的 teamID>`);模拟器构建忽略签名,不需要。
    configFiles:
      Debug: BuildSettings.xcconfig
      Release: BuildSettings.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kevinfitzroy.xrealclient
        PRODUCT_NAME: Agent Deck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        # App Group:读 ShareExtension 落进来的共享音频收件箱(AudioInbox)。
        CODE_SIGN_ENTITLEMENTS: App/XrealPOC.entitlements

  # 「分享到 Agent Deck」Share Extension —— 接收音频文件存进 App Group 共享收件箱。
  # 刻意精简:不依赖 Citadel/SwiftTerm,只用 UIKit + Shared/AudioInbox.swift。
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    configFiles:
      Debug: BuildSettings.xcconfig
      Release: BuildSettings.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kevinfitzroy.xrealclient.shareext
        PRODUCT_NAME: ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements

  # 录音 Live Activity widget extension(锁屏/灵动岛录音状态,#23 P2)。WidgetKit + ActivityKit;
  # 不需 App Group(状态经 ActivityKit ContentState 传,不走共享容器)。真机首次装需 Xcode Run 一次开通 provisioning。
  RecordingWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: RecordingWidget
      - path: SharedLive
    configFiles:
      Debug: BuildSettings.xcconfig
      Release: BuildSettings.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kevinfitzroy.xrealclient.recwidget
        PRODUCT_NAME: RecordingWidget
        INFOPLIST_FILE: RecordingWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
