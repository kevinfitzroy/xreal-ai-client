name: XrealPOC
options:
  bundleIdPrefix: io.github.kevinfitzroy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.12.0"
  # 原生终端模拟器(xterm.js 的 iOS 等价)。WKWebView 收不到硬件键 + 软键盘抑制的死结 → 改用它,
  # 键盘全原生正确处理(硬件键/修饰/DECCKM)。它是 La Terminal 的开源内核,底层同样 swift-nio-ssh。
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

targets:
  XrealPOC:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      # Asset catalog holds AppIcon (1024 universal; Xcode generates the rest). Compiled
      # into Assets.car → app launcher icon = the same `>_` terminal-prompt mark as Android.
      - path: App/Assets.xcassets
      # web/ as a FOLDER REFERENCE (blue folder) so index.html's relative src/href +
      # @font-face url() resolve, and allowingReadAccessTo: can grant the whole dir.
      # buildPhase: resources puts it in the Copy Bundle Resources phase.
      - path: App/web
        type: folder
        buildPhase: resources
      # 共享音频收件箱(App Group)—— 主 app 与 ShareExtension 都编译这一份。
      - path: Shared
    dependencies:
      - package: Citadel
      - package: SwiftTerm
      # 嵌入「分享到 Agent Station」扩展(接收语音备忘录等分享的音频文件)。
      # 真机首次装需在 Xcode Run 一次开通 App Group provisioning(CLI 签不了带新能力的 profile)。
      - target: ShareExtension
    postBuildScripts:
      - name: Stamp Git revision
        script: |
          set -e
          INFO_PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          GIT_ROOT="$(git -C "$PROJECT_DIR" rev-parse --show-toplevel 2>/dev/null || true)"
          GIT_REV="unknown"
          if [ -n "$GIT_ROOT" ]; then
            GIT_REV="$(git -C "$GIT_ROOT" rev-parse --short HEAD 2>/dev/null || echo unknown)"
          fi
          /usr/libexec/PlistBuddy -c "Set :AgentStationGitRevision $GIT_REV" "$INFO_PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :AgentStationGitRevision string $GIT_REV" "$INFO_PLIST"
      - name: Embed optional Xraybridge
        script: |
          set -e
          SRC="$PROJECT_DIR/App/Frameworks/Xraybridge.framework"
          if [ ! -d "$SRC" ]; then
            echo "Xraybridge.framework absent; SSH-over-443 proxy hosts will fail closed."
            exit 0
          fi
          DST="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
          mkdir -p "$DST"
          rsync -a --delete "$SRC" "$DST/"
          if [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ] && [ "${CODE_SIGNING_ALLOWED:-NO}" != "NO" ]; then
            /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --preserve-metadata=identifier,entitlements "$DST/Xraybridge.framework"
          fi
    # 版本号放进 Version.xcconfig; DEVELOPMENT_TEAM 放进 gitignored Signing.xcconfig —— 不让个人 Apple ID team 进公开 repo。
    # 真机构建需本地有 ios/Signing.xcconfig(内含 `DEVELOPMENT_TEAM = <你的 teamID>`);模拟器构建忽略签名,不需要。
    configFiles:
      Debug: BuildSettings.xcconfig
      Release: BuildSettings.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kevinfitzroy.xrealclient
        PRODUCT_NAME: Agent Station
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        # App Group:读 ShareExtension 落进来的共享音频收件箱(AudioInbox)。
        CODE_SIGN_ENTITLEMENTS: App/XrealPOC.entitlements

  # 「分享到 Agent Station」Share Extension —— 接收音频文件存进 App Group 共享收件箱。
  # 刻意精简:不依赖 Citadel/SwiftTerm,只用 UIKit + Shared/AudioInbox.swift。
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    configFiles:
      Debug: BuildSettings.xcconfig
      Release: BuildSettings.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kevinfitzroy.xrealclient.ShareExtension
        PRODUCT_NAME: ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
