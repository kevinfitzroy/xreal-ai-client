name: XrealPOC
options:
  bundleIdPrefix: io.github.kevinfitzroy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.12.0"

targets:
  XrealPOC:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      # Asset catalog holds AppIcon (1024 universal; Xcode generates the rest). Compiled
      # into Assets.car → app launcher icon = the same `>_` terminal-prompt mark as Android.
      - path: App/Assets.xcassets
      # web/ as a FOLDER REFERENCE (blue folder) so index.html's relative src/href +
      # @font-face url() resolve, and allowingReadAccessTo: can grant the whole dir.
      # buildPhase: resources puts it in the Copy Bundle Resources phase.
      - path: App/web
        type: folder
        buildPhase: resources
    dependencies:
      - package: Citadel
    # DEVELOPMENT_TEAM 放进 gitignored Signing.xcconfig —— 不让个人 Apple ID team 进公开 repo。
    # 真机构建需本地有 ios/Signing.xcconfig(内含 `DEVELOPMENT_TEAM = <你的 teamID>`);模拟器构建忽略签名,不需要。
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kevinfitzroy.xrealclient
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
