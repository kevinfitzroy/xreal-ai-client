<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="xterm.css">
<title>Agent Deck</title>
<style>
  :root {
    --bg:#0d0f16; --surface:#161922; --surface-2:#1c202b; --line:#262b38;
    --fg:#e6e6e6; --fg-dim:#8b93a7; --fg-faint:#565d70;
    --work:#94e0b2; --wait:#ffb454; --idle:#5b6478; --offline:#e06c75; --accent:#94e0b2;
    --mono:'JetBrains Mono','SF Mono','Menlo','Consolas',monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--fg); font-family:var(--mono); -webkit-font-smoothing:antialiased; overflow:hidden; height:100vh; }
  .view { position:absolute; inset:0; }
  .view[hidden] { display:none !important; }  /* 压过下面 #view-list/#view-term 的 ID 级 display:flex */

  /* ============ 列表视图 ============ */
  #view-list {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(148,224,178,.05), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,180,84,.045), transparent 55%),
      var(--bg);
    display:flex; flex-direction:column;
  }
  /* 横屏:header 一行,品牌左 + 舰队概览右 */
  header { flex:none; display:flex; align-items:center; justify-content:space-between; gap:24px; padding:13px 24px; border-bottom:1px solid var(--line); background:linear-gradient(180deg, rgba(22,25,34,.6), transparent); }
  .brand { display:flex; align-items:baseline; gap:11px; flex:none; }
  .brand .mark { font-size:13px; letter-spacing:.32em; color:var(--accent); text-transform:uppercase; font-weight:700; }
  .brand .mark::before { content:"▌ "; }
  .brand .sub { font-size:11px; color:var(--fg-faint); letter-spacing:.12em; }
  .fleet { display:flex; gap:9px; flex:none; }
  .pill { display:flex; align-items:center; gap:8px; padding:8px 13px; border-radius:10px; background:var(--surface); border:1px solid var(--line); }
  .pill .n { font-weight:700; font-size:18px; min-width:16px; }
  .pill .dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .pill .lbl { color:var(--fg-dim); font-size:12px; letter-spacing:.1em; text-transform:uppercase; }
  .pill.need { border-color:rgba(255,180,84,.45); background:rgba(255,180,84,.08); }
  .pill.need .n { color:var(--wait); } .pill.need .dot { background:var(--wait); box-shadow:0 0 10px var(--wait); animation:pulse 1.4s ease-in-out infinite; }
  .pill.work .n { color:var(--work); } .pill.work .dot { background:var(--work); }
  .pill.idle .n { color:var(--fg-dim); } .pill.idle .dot { background:var(--idle); }
  .pill.off  .n { color:var(--offline); } .pill.off .dot { background:var(--offline); }
  main { flex:1; overflow-y:auto; padding:12px 24px 64px; }
  main::-webkit-scrollbar { width:0; }
  /* 响应式:窄屏 2 列,MacBook 级宽屏自动 3 列(适配眼镜可视区与手机面板的不同长宽比)*/
  .cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(360px, 1fr)); gap:10px; }
  .host { display:flex; align-items:center; gap:10px; margin:16px 4px 9px; color:var(--fg-dim); font-size:12px; letter-spacing:.16em; text-transform:uppercase; }
  .host:first-child { margin-top:4px; }
  .host .hconn { width:7px; height:7px; border-radius:50%; background:var(--work); box-shadow:0 0 8px var(--work); flex:none; }
  .host.down .hconn { background:var(--offline); box-shadow:none; }
  .host .hname { color:var(--fg); font-weight:700; letter-spacing:.07em; }
  .host .haddr { color:var(--fg-faint); font-size:11px; letter-spacing:.03em; text-transform:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .host .hline { flex:1; height:1px; background:linear-gradient(90deg,var(--line),transparent); min-width:12px; }
  .card { position:relative; display:grid; grid-template-columns:5px 44px 1fr; align-items:stretch;
          background:var(--surface); border:1px solid var(--line); border-radius:13px; overflow:hidden;
          transition:transform .14s ease, border-color .14s ease, background .14s ease;
          opacity:0; transform:translateY(8px); animation:rise .4s cubic-bezier(.2,.7,.3,1) forwards; }
  .rail { width:5px; }
  .card.s-work .rail { background:linear-gradient(var(--work),rgba(148,224,178,.35)); }
  .card.s-wait .rail { background:var(--wait); box-shadow:0 0 16px var(--wait); animation:railpulse 1.5s ease-in-out infinite; }
  .card.s-idle .rail { background:var(--idle); }
  .card.s-offline .rail { background:var(--offline); opacity:.55; }
  .ticon { width:44px; display:flex; align-items:center; justify-content:center; }
  .ticon i { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:var(--surface-2); border:1px solid var(--line); }
  .ticon svg { width:22px; height:22px; }
  .cbody { padding:13px 14px 13px 12px; min-width:0; }
  .topline { display:flex; align-items:center; gap:10px; }
  .name { flex:1; min-width:0; font-size:21px; font-weight:700; letter-spacing:.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .status { flex:none; display:inline-flex; align-items:center; gap:7px; font-size:12px; letter-spacing:.1em; font-weight:700; padding:5px 9px; border-radius:7px; white-space:nowrap; }
  .status .sd { width:8px; height:8px; border-radius:50%; flex:none; }
  .s-work .status { color:var(--work); background:rgba(148,224,178,.10); }
  .s-work .status .sd{ background:var(--work); position:relative; }
  .s-work .status .sd::after { content:""; position:absolute; inset:-3px; border-radius:50%; border:1.5px solid var(--work); border-top-color:transparent; animation:spin .9s linear infinite; }
  .s-wait .status { color:var(--wait); background:rgba(255,180,84,.12); }
  .s-wait .status .sd{ background:var(--wait); box-shadow:0 0 8px var(--wait); animation:pulse 1.3s ease-in-out infinite; }
  .s-idle .status { color:var(--fg-dim); background:rgba(91,100,120,.12); }
  .s-idle .status .sd{ background:var(--idle); }
  .s-offline .status { color:var(--offline); background:rgba(224,108,117,.10); }
  .s-offline .status .sd{ background:var(--offline); }
  .subline { margin-top:6px; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--fg-faint); letter-spacing:.04em; }
  .subline .type { text-transform:uppercase; letter-spacing:.1em; } .subline .sep { opacity:.5; }
  .preview { margin-top:8px; font-size:15px; color:var(--fg-dim); display:flex; gap:8px; align-items:baseline; white-space:nowrap; overflow:hidden; }
  .preview .glyph { flex:none; color:var(--fg-faint); font-weight:700; }
  .preview .txt { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card.s-wait .preview, .card.s-wait .preview .glyph { color:var(--wait); }
  .card.s-work .preview .txt { color:var(--work); }
  .card.focused { border-color:var(--accent); background:var(--surface-2); transform:translateX(3px); box-shadow:0 0 0 1px var(--accent), 0 8px 30px rgba(0,0,0,.5), -2px 0 24px rgba(148,224,178,.12); }
  .card.focused.s-wait { border-color:var(--wait); box-shadow:0 0 0 1px var(--wait), 0 8px 30px rgba(0,0,0,.5), -2px 0 26px rgba(255,180,84,.22); }
  .card .cursor { position:absolute; left:-1px; top:50%; transform:translateY(-50%) scaleX(0); transform-origin:left; color:var(--accent); font-size:20px; font-weight:700; opacity:0; transition:transform .14s ease,opacity .14s ease; }
  .card.focused.s-wait .cursor { color:var(--wait); }
  .card.focused .cursor { transform:translateY(-50%) scaleX(1); opacity:1; }
  .card.opening { animation:flash .3s ease; }
  footer { position:fixed; left:0; right:0; bottom:0; padding:13px 20px; background:linear-gradient(0deg, var(--bg) 35%, transparent); display:flex; gap:20px; align-items:center; font-size:13px; color:var(--fg-faint); letter-spacing:.05em; z-index:5; }
  footer .k { color:var(--bg); background:var(--fg-dim); border-radius:5px; padding:2px 8px; font-weight:700; font-size:12px; margin-right:5px; }
  footer .spacer { flex:1; }

  /* ============ 终端视图 ============ */
  #view-term { background:#11131a; display:flex; flex-direction:column; }
  #term-bar { flex:none; display:flex; align-items:center; gap:10px; padding:11px 16px; border-bottom:1px solid var(--line); background:rgba(22,25,34,.6); font-size:14px; }
  .tbar-back { color:var(--fg-dim); background:var(--surface-2); border:1px solid var(--line); border-radius:8px;
    padding:6px 13px; font-family:var(--mono); font-size:14px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .tbar-back:active { background:#222838; border-color:var(--accent); color:var(--fg); }
  #term-bar .tproj { color:var(--accent); font-weight:700; letter-spacing:.02em; }
  #term-bar .ttype { color:var(--fg-faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase; }
  #term-wrap { flex:1; position:relative; }
  #term { position:absolute; inset:0; padding:8px; }
  .xterm-viewport { background-color:transparent !important; }
  #voice-overlay { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(20,22,30,.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); padding:16px 24px; border-radius:12px; color:#e6e6e6; min-width:360px; max-width:80vw; box-shadow:0 10px 40px rgba(0,0,0,.5); display:none; z-index:100; font-size:14px; }
  #overlay-text { margin-top:8px; color:#94e0b2; word-break:break-word; }
  #overlay-hint { margin-top:12px; font-size:12px; color:#888; }

  /* ============ 自绘虚拟键盘(v1)============ */
  #vkeyboard { position:fixed; left:0; right:0; bottom:0; z-index:20; display:flex; flex-direction:column; gap:8px;
    padding:10px 14px; background:linear-gradient(0deg, var(--bg) 70%, rgba(13,15,22,.9)); border-top:1px solid var(--line); }
  #vkeyboard[hidden] { display:none; }
  .krow { display:flex; gap:8px; justify-content:center; }
  .kc { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    min-width:54px; height:56px; padding:0 10px; border-radius:12px; background:var(--surface-2); border:1px solid var(--line);
    color:var(--fg); font-family:var(--mono); cursor:pointer; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
    transition:transform .08s, background .12s, border-color .12s; }
  .kc.sys { background:rgba(123,162,247,.08); border-color:rgba(123,162,247,.32); }
  .kc.sys .kl { color:#7aa2f7; }
  .kc:active, .kc.held { transform:translateY(1px); background:#222838; border-color:var(--accent); }
  .kc .kl { font-size:20px; font-weight:700; line-height:1; }
  .kc .ks { font-size:10px; color:var(--fg-dim); letter-spacing:.06em; text-transform:uppercase; }
  .kc.voice { background:rgba(148,224,178,.08); border-color:rgba(148,224,178,.35); }
  .kc.voice .kl { color:var(--accent); }
  .kc.voice.held { background:rgba(255,180,84,.18); border-color:var(--wait); }
  .kc.voice.held .kl { color:var(--wait); }
  #hint-footer { position:fixed; left:0; right:0; bottom:0; z-index:20; padding:13px 20px; background:linear-gradient(0deg, var(--bg) 35%, transparent); display:flex; gap:20px; align-items:center; font-size:13px; color:var(--fg-faint); letter-spacing:.05em; }
  #hint-footer[hidden] { display:none; }
  #hint-footer .k { color:var(--bg); background:var(--fg-dim); border-radius:5px; padding:2px 8px; font-weight:700; font-size:12px; margin-right:5px; }
  #hint-footer .spacer { flex:1; }
  /* 底部空间:列表恒留 slim hint;终端按是否显示虚拟键盘留 2 行 or slim */
  #list { padding-bottom:60px; }
  body.vk-on #term { bottom:150px; }       /* 2 行虚拟键盘 */
  body:not(.vk-on) #term { bottom:52px; }  /* slim hint(接了硬件键盘时)*/

  @keyframes rise { to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
  @keyframes railpulse { 0%,100%{ box-shadow:0 0 16px var(--wait); } 50%{ box-shadow:0 0 4px var(--wait); } }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes flash { 50% { background:rgba(148,224,178,.18); } }
</style>
</head>
<body>
  <!-- 列表视图 -->
  <div id="view-list" class="view">
    <header>
      <div class="brand"><span class="mark">Agent&nbsp;Deck</span><span class="sub">// xreal · beam pro</span></div>
      <div class="fleet" id="fleet"></div>
    </header>
    <main id="list"></main>
  </div>

  <!-- 终端视图 -->
  <div id="view-term" class="view" hidden>
    <div id="term-bar">
      <button class="tbar-back" onclick="vkey('home')">‹ 返回</button>
      <span class="tproj" id="term-proj">—</span>
      <span class="ttype" id="term-type"></span>
    </div>
    <div id="term-wrap"><div id="term"></div></div>
    <div id="voice-overlay">
      <div id="overlay-status">🎤 录音中…</div>
      <div id="overlay-text"></div>
      <div id="overlay-hint">Enter 发送 · Esc 撤销 · F13/F14 重说</div>
    </div>
  </div>

  <!-- 自绘虚拟键盘(外接键盘未连接时显示)— v1: 8 键,后续按 8BitDo Micro 实际键位迭代 -->
  <div id="vkeyboard">
    <div class="krow">
      <button class="kc sys" data-act="home"><span class="kl">⌂</span><span class="ks">返回</span></button>
      <button class="kc" data-act="left"><span class="kl">←</span></button>
      <button class="kc" data-act="up"><span class="kl">↑</span></button>
      <button class="kc" data-act="down"><span class="kl">↓</span></button>
      <button class="kc" data-act="right"><span class="kl">→</span></button>
      <button class="kc" data-act="enter"><span class="kl">↵</span><span class="ks">Enter</span></button>
      <button class="kc" data-act="esc"><span class="kl">⎋</span><span class="ks">Esc</span></button>
    </div>
    <div class="krow">
      <button class="kc" data-act="delword"><span class="kl">⌫</span><span class="ks">删词</span></button>
      <button class="kc" data-act="tab"><span class="kl">⇥</span><span class="ks">Tab</span></button>
      <button class="kc" data-act="shifttab"><span class="kl">⇧⇥</span><span class="ks">模式</span></button>
      <button class="kc" data-act="ctrlc"><span class="kl">^C</span><span class="ks">中断</span></button>
      <button class="kc voice" data-voice="zh"><span class="kl">🎤</span><span class="ks">中文</span></button>
      <button class="kc voice" data-voice="en"><span class="kl">🎤</span><span class="ks">EN</span></button>
    </div>
  </div>
  <div id="hint-footer" hidden>
    <span><span class="k">↑↓</span>导航</span><span><span class="k">↵</span>进入</span><span><span class="k">F13</span>语音</span>
    <span class="spacer"></span><span id="clock"></span>
  </div>

  <script src="xterm.js"></script>
  <script src="addon-fit.js"></script>
  <script src="addon-webgl.js"></script>
  <script src="addon-search.js"></script>
  <script>
  /* ========== 列表数据 + 渲染 ========== */
  const ICONS = {
    ssh:`<svg viewBox="0 0 24 24" fill="none" stroke="#8b93a7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l5 5-5 5"/><path d="M12 17h8"/></svg>`,
    claude:`<svg viewBox="0 0 24 24" fill="none" stroke="#d98a52" stroke-width="2.2" stroke-linecap="round"><path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4"/></svg>`,
    agent:`<svg viewBox="0 0 24 24" fill="none" stroke="#7aa2f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="11" rx="2.5"/><path d="M12 8V4M8.5 13h.01M15.5 13h.01M9 19v2M15 19v2"/></svg>`,
  };
  const TYPE_LABEL = { ssh:'SSH', claude:'Claude Code', agent:'Agent' };
  const STATUS = { work:{cls:'s-work',label:'工作中'}, wait:{cls:'s-wait',label:'等待反馈'}, idle:{cls:'s-idle',label:'未激活'}, offline:{cls:'s-offline',label:'已断开'} };
  const HOSTS = [
    { name:'beam-server', addr:'evan@104.21.x.x', up:true, projects:[
      { name:'xreal-ai-client', type:'claude', status:'work', age:'now', preview:{glyph:'↳', text:'Editing TerminalBridge.kt — wiring channel swap…', cur:true} },
      { name:'term-on-demand',  type:'claude', status:'wait', age:'4m',  preview:{glyph:'?', text:'Proceed with the DB migration on prod? (y/n)'} },
      { name:'api-gateway',     type:'claude', status:'work', age:'now', preview:{glyph:'↳', text:'Running test suite — 142/210 passed…', cur:true} },
      { name:'prod-logs',       type:'ssh',    status:'idle', age:'2h',  preview:null },
    ]},
    { name:'gpu-box', addr:'root@gpu-01.lan', up:true, projects:[
      { name:'model-eval',    type:'claude', status:'wait', age:'1m',  preview:{glyph:'?', text:'Found 3 refactor approaches — which to implement? [1/2/3]'} },
      { name:'data-pipeline', type:'agent',  status:'work', age:'now', preview:{glyph:'↳', text:'Epoch 12/50 · loss 0.0431 · eta 22m', cur:true} },
      { name:'gpu-monitor',   type:'ssh',    status:'idle', age:'5h',  preview:null },
    ]},
    { name:'edge-pi', addr:'pi@home.lan', up:false, projects:[
      { name:'backup-cron', type:'agent',  status:'work',    age:'now', preview:{glyph:'↳', text:'rsync — 2.3GB / 8.1GB transferred…', cur:true} },
      { name:'scraper',     type:'claude', status:'idle',    age:'1d',  preview:{glyph:'·', text:'session not started'} },
      { name:'home-assist', type:'ssh',    status:'offline', age:'3d',  preview:null },
    ]},
  ];
  const flat = [];
  function esc(s){ return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function render(){
    const list=document.getElementById('list'); let counts={work:0,wait:0,idle:0,offline:0}; let html=''; let idx=0; let delay=0;
    HOSTS.forEach(h=>{
      html+=`<div class="host${h.up?'':' down'}"><span class="hconn"></span><span class="hname">${h.name}</span><span class="haddr">${h.addr}</span><span class="hline"></span></div>`;
      html+=`<div class="cards">`;
      h.projects.forEach(p=>{
        counts[p.status]++; const st=STATUS[p.status];
        const pv = p.preview ? `<div class="preview"><span class="glyph">${p.preview.glyph}</span><span class="txt ${p.preview.cur?'cur':''}">${esc(p.preview.text)}</span></div>` : '';
        html+=`<div class="card ${st.cls}" data-idx="${idx}" style="animation-delay:${delay}ms">
          <span class="cursor">▸</span><span class="rail"></span>
          <span class="ticon"><i>${ICONS[p.type]}</i></span>
          <div class="cbody">
            <div class="topline"><span class="name">${esc(p.name)}</span><span class="status"><span class="sd"></span>${st.label}</span></div>
            <div class="subline"><span class="type">${TYPE_LABEL[p.type]}</span><span class="sep">·</span><span class="age">${p.age}</span></div>
            ${pv}
          </div></div>`;
        flat.push({host:h.name,...p}); idx++; delay+=42;
      });
      html+=`</div>`;
    });
    list.innerHTML=html;
    document.getElementById('fleet').innerHTML = pill('need',counts.wait,'需要你')+pill('work',counts.work,'工作中')+pill('idle',counts.idle,'未激活')+pill('off',counts.offline,'已断开');
  }
  function pill(c,n,l){ return `<div class="pill ${c}"><span class="dot"></span><span class="n">${n}</span><span class="lbl">${l}</span></div>`; }

  /* ========== 列表键盘导航 ========== */
  let focusIdx=0;
  function setFocus(i){ const cards=[...document.querySelectorAll('.card')]; if(!cards.length)return;
    focusIdx=(i+cards.length)%cards.length; cards.forEach(c=>c.classList.remove('focused'));
    const el=cards[focusIdx]; el.classList.add('focused'); el.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  function openFocused(){ const el=document.querySelectorAll('.card')[focusIdx]; if(!el)return;
    el.classList.add('opening'); const p=flat[focusIdx];
    console.log('[deck] OPEN',JSON.stringify({host:p.host,name:p.name,type:p.type,status:p.status}));
    setTimeout(()=>el.classList.remove('opening'),320);
    if(window.Bridge&&window.Bridge.openProject) window.Bridge.openProject(p.host,p.name,p.type);
    else showTerminal(p.name,p.type);  // 无 Bridge(headless 测试)时 JS 自切
  }

  /* ========== 视图切换 ========== */
  let currentView='list';
  window.showTerminal=function(name,type){
    document.getElementById('term-proj').textContent=name||'session';
    document.getElementById('term-type').textContent=type?TYPE_LABEL[type]||'':'';
    document.getElementById('view-list').hidden=true;
    document.getElementById('view-term').hidden=false;
    currentView='term';
    updateBottomBar();
    requestAnimationFrame(()=>{ try{ fitAddon.fit(); }catch(e){} term.focus(); });
  };
  window.showList=function(){
    document.getElementById('view-term').hidden=true;
    document.getElementById('view-list').hidden=false;
    currentView='list';
    updateBottomBar();
  };
  window.currentView=function(){ return currentView; };

  /* ========== xterm ========== */
  const term=new Terminal({ fontFamily:'"JetBrains Mono","Menlo",monospace', fontSize:14, lineHeight:1.2, cursorBlink:true, scrollback:10000,
    theme:{ background:'#11131a', foreground:'#e6e6e6', cursor:'#94e0b2', selectionBackground:'#3a4760' } });
  const fitAddon=new FitAddon.FitAddon();
  term.loadAddon(fitAddon); term.loadAddon(new SearchAddon.SearchAddon());
  term.open(document.getElementById('term'));
  try{ term.loadAddon(new WebglAddon.WebglAddon()); }catch(e){ console.warn('[xreal] WebGL fallback',e); }
  term.onData(d=>{ if(window.Bridge&&window.Bridge.onInput) window.Bridge.onInput(btoa(unescape(encodeURIComponent(d)))); });
  term.onResize(({cols,rows})=>{ if(window.Bridge&&window.Bridge.onResize) window.Bridge.onResize(cols,rows); });
  window.writeToTerm=function(b64){ const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); term.write(u); };
  window.showOverlay=function(s,t){ document.getElementById('overlay-status').innerText=s||''; document.getElementById('overlay-text').innerText=t||''; document.getElementById('voice-overlay').style.display='block'; };
  window.hideOverlay=function(){ document.getElementById('voice-overlay').style.display='none'; };

  /* ========== 全局键盘:列表态自己处理↑↓↵;终端态交给 xterm ========== */
  document.addEventListener('keydown', e=>{
    if(currentView!=='list') return;  // 终端态:不拦截,xterm/Kotlin 处理
    switch(e.key){
      case 'ArrowDown': case 'ArrowRight': case 'j': setFocus(focusIdx+1); e.preventDefault(); break;
      case 'ArrowUp':   case 'ArrowLeft':  case 'k': setFocus(focusIdx-1); e.preventDefault(); break;
      case 'Enter': openFocused(); e.preventDefault(); break;
    }
  });
  // 触屏:点卡片直接进入(无硬件键盘时的导航方式)
  document.getElementById('list').addEventListener('click', e=>{
    const c=e.target.closest('.card'); if(!c) return;
    setFocus(+c.dataset.idx); openFocused();
  });

  window.updateProject=function(host,name,patch){ const i=flat.findIndex(p=>p.host===host&&p.name===name); if(i<0)return; Object.assign(flat[i],patch); const keep=focusIdx; flat.length=0; render(); setFocus(keep); };

  /* ========== 虚拟键盘 ========== */
  function writeChannel(s){ if(window.Bridge&&window.Bridge.onInput) window.Bridge.onInput(btoa(unescape(encodeURIComponent(s)))); }
  function vkey(a){
    // 返回 home 两个视图都可用
    if(a==='home'){ if(window.Bridge&&window.Bridge.goHome) window.Bridge.goHome(); else showList(); return; }
    if(currentView==='list'){
      if(a==='up'||a==='left') setFocus(focusIdx-1);
      else if(a==='down'||a==='right') setFocus(focusIdx+1);
      else if(a==='enter') openFocused();
      return;  // 列表态忽略其它键
    }
    // 终端态:方向键 → ANSI;其它 → 控制字节
    switch(a){
      case 'up':    writeChannel('\x1b[A'); break;
      case 'down':  writeChannel('\x1b[B'); break;
      case 'right': writeChannel('\x1b[C'); break;
      case 'left':  writeChannel('\x1b[D'); break;
      case 'enter': if(window.Bridge&&window.Bridge.vkeyEnter) window.Bridge.vkeyEnter(); else writeChannel('\r'); break;
      case 'esc':   if(window.Bridge&&window.Bridge.vkeyEsc) window.Bridge.vkeyEsc(); else writeChannel('\x1b'); break;
      case 'tab':      writeChannel('\t'); break;
      case 'shifttab': writeChannel('\x1b[Z'); break;   // back-tab(Claude Code 切换模式)
      case 'delword':  writeChannel('\x17'); break;     // Ctrl+W 删上一个词
      case 'ctrlc':    writeChannel('\x03'); break;     // Ctrl+C 中断
    }
  }
  document.querySelectorAll('#vkeyboard .kc[data-act]').forEach(b=>b.addEventListener('click',()=>vkey(b.dataset.act)));
  document.querySelectorAll('#vkeyboard .kc[data-voice]').forEach(b=>{
    const lang=b.dataset.voice;
    const down=e=>{ e.preventDefault(); b.classList.add('held'); if(window.Bridge&&window.Bridge.voiceDown) window.Bridge.voiceDown(lang); };
    const up=e=>{ e.preventDefault(); if(!b.classList.contains('held'))return; b.classList.remove('held'); if(window.Bridge&&window.Bridge.voiceUp) window.Bridge.voiceUp(lang); };
    b.addEventListener('touchstart',down,{passive:false}); b.addEventListener('touchend',up); b.addEventListener('touchcancel',up);
    b.addEventListener('mousedown',down); b.addEventListener('mouseup',up); b.addEventListener('mouseleave',up);
  });
  let hwkb=false;  // 是否接了外置物理键盘
  function updateBottomBar(){
    const showVk = (currentView==='term') && !hwkb;   // 虚拟键盘只在终端 + 无硬件键盘时显示
    document.getElementById('vkeyboard').hidden=!showVk;
    document.getElementById('hint-footer').hidden=showVk;
    document.body.classList.toggle('vk-on',showVk);
    if(currentView==='term') requestAnimationFrame(()=>{ try{fitAddon.fit();}catch(e){} });
  }
  window.setHwKeyboard=function(present){ hwkb=present; updateBottomBar(); };  // Kotlin 在键盘插拔时调

  function tick(){ document.getElementById('clock').textContent=new Date().toTimeString().slice(0,5); }
  let resizePending=false;
  window.addEventListener('resize',()=>{ if(resizePending)return; resizePending=true; requestAnimationFrame(()=>{ resizePending=false; if(currentView==='term'){ try{ fitAddon.fit(); }catch(e){} } }); });
  render(); setFocus(0); tick(); setInterval(tick,1000);
  hwkb = (window.Bridge&&window.Bridge.hasHardwareKeyboard) ? window.Bridge.hasHardwareKeyboard() : false;
  updateBottomBar();   // 列表态:虚拟键盘不显示,只 slim hint
  console.log('[deck] index.html ready, hwKeyboard='+hwkb);
  </script>
</body>
</html>
