<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="xterm.css">

<title>Agent Deck</title>
<style>
  /* 终端字体:Meslo LG S(用户 iTerm 同款,Latin + powerline)作主字体;Sarasa Term SC Nerd 子集
     作 CJK 回退(中英 2:1)。locale 修好后 WebGL 的 canvas 逐字形回退正常工作。 */
  @font-face{ font-family:'MesloLGS'; src:url('meslo-powerline.otf') format('opentype'); font-display:block; }
  @font-face{ font-family:'SarasaTerm'; src:url('sarasa-term.ttf') format('truetype'); font-display:block; }
  :root {
    --bg:#0d0f16; --surface:#161922; --surface-2:#1c202b; --line:#262b38;
    --fg:#e6e6e6; --fg-dim:#8b93a7; --fg-faint:#565d70;
    --work:#94e0b2; --wait:#ffb454; --idle:#5b6478; --offline:#e06c75; --accent:#94e0b2;
    --maestro:#bb9af7;   /* Maestro 专属紫罗兰,避开所有状态色 */
    --mono:'JetBrains Mono','SF Mono','Menlo','Consolas',monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--fg); font-family:var(--mono); -webkit-font-smoothing:antialiased; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
  /* body 纵向 flex:#views 占满剩余 + 底部键盘区固定高度。min-height:0 让内部 scroll 正常 */
  #views { flex:1 1 auto; position:relative; min-height:0; }
  .view { position:absolute; inset:0; }
  .view[hidden] { display:none !important; }  /* 压过下面 #view-list/#view-term 的 ID 级 display:flex */

  /* ============ 列表视图 ============ */
  #view-list {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(148,224,178,.05), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,180,84,.045), transparent 55%),
      var(--bg);
    display:flex; flex-direction:column;
  }
  main { flex:1; overflow-y:auto; padding:12px 24px 16px; }
  main::-webkit-scrollbar { width:0; }
  /* 响应式:窄屏 2 列,MacBook 级宽屏自动 3 列(适配眼镜可视区与手机面板的不同长宽比)*/
  .cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(360px, 1fr)); gap:10px; }
  .host { display:flex; align-items:center; gap:10px; margin:16px 4px 9px; color:var(--fg-dim); font-size:12px; letter-spacing:.16em; text-transform:uppercase; }
  .host:first-child { margin-top:4px; }
  .host .hconn { width:7px; height:7px; border-radius:50%; background:var(--work); box-shadow:0 0 8px var(--work); flex:none; }
  .host.down .hconn { background:var(--offline); box-shadow:none; }
  .host .hname { color:var(--fg); font-weight:700; letter-spacing:.07em; }
  .host .haddr { color:var(--fg-faint); font-size:11px; letter-spacing:.03em; text-transform:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .host .hline { flex:1; height:1px; background:linear-gradient(90deg,var(--line),transparent); min-width:12px; }
  .card { position:relative; display:grid; grid-template-columns:5px 44px 1fr; align-items:stretch;
          background:var(--surface); border:1px solid var(--line); border-radius:13px; overflow:hidden;
          transition:transform .14s ease, border-color .14s ease, background .14s ease;
          opacity:0; transform:translateY(8px); animation:rise .4s cubic-bezier(.2,.7,.3,1) forwards; }
  .rail { width:5px; }
  .card.s-work .rail { background:linear-gradient(var(--work),rgba(148,224,178,.35)); }
  .card.s-wait .rail { background:var(--wait); box-shadow:0 0 16px var(--wait); animation:railpulse 1.5s ease-in-out infinite; }
  .card.s-idle .rail { background:var(--idle); }
  .card.s-offline .rail { background:var(--offline); opacity:.55; }
  .ticon { width:44px; display:flex; align-items:center; justify-content:center; }
  .ticon i { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:var(--surface-2); border:1px solid var(--line); }
  .ticon svg { width:22px; height:22px; }
  .cbody { padding:13px 14px 13px 12px; min-width:0; }
  .topline { display:flex; align-items:center; gap:10px; }
  .name { flex:1; min-width:0; font-size:21px; font-weight:700; letter-spacing:.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .status { flex:none; display:inline-flex; align-items:center; gap:7px; font-size:12px; letter-spacing:.1em; font-weight:700; padding:5px 9px; border-radius:7px; white-space:nowrap; }
  .status .sd { width:8px; height:8px; border-radius:50%; flex:none; }
  .s-work .status { color:var(--work); background:rgba(148,224,178,.10); }
  .s-work .status .sd{ background:var(--work); position:relative; }
  .s-work .status .sd::after { content:""; position:absolute; inset:-3px; border-radius:50%; border:1.5px solid var(--work); border-top-color:transparent; animation:spin .9s linear infinite; }
  .s-wait .status { color:var(--wait); background:rgba(255,180,84,.12); }
  .s-wait .status .sd{ background:var(--wait); box-shadow:0 0 8px var(--wait); animation:pulse 1.3s ease-in-out infinite; }
  .s-idle .status { color:var(--fg-dim); background:rgba(91,100,120,.12); }
  .s-idle .status .sd{ background:var(--idle); }
  .s-offline .status { color:var(--offline); background:rgba(224,108,117,.10); }
  .s-offline .status .sd{ background:var(--offline); }
  /* loading:首屏拉 manifest 时,状态徽章(on duty 那格)显示转圈 */
  .s-loading .status { color:var(--fg-dim); background:rgba(123,162,247,.10); }
  .s-loading .status .sd{ background:transparent; position:relative; }
  .s-loading .status .sd::after{ content:""; position:absolute; inset:-2px; border-radius:50%; border:1.5px solid var(--fg-dim); border-top-color:transparent; animation:spin .8s linear infinite; }
  /* hooks 实时态:working=绿转圈(在跑)/ waiting=琥珀脉冲(轮到你)/ disc=红(掉线)/ unknown=暗 */
  .s-working .status { color:var(--work); background:rgba(148,224,178,.10); }
  .s-working .status .sd{ background:var(--work); position:relative; }
  .s-working .status .sd::after{ content:""; position:absolute; inset:-3px; border-radius:50%; border:1.5px solid var(--work); border-top-color:transparent; animation:spin .9s linear infinite; }
  .s-waiting .status { color:var(--wait); background:rgba(255,180,84,.12); }
  .s-waiting .status .sd{ background:var(--wait); box-shadow:0 0 8px var(--wait); animation:pulse 1.3s ease-in-out infinite; }
  .s-disc .status { color:var(--offline); background:rgba(224,108,117,.10); }
  .s-disc .status .sd{ background:var(--offline); }
  .s-unknown .status { color:var(--fg-faint); background:rgba(91,100,120,.08); }
  .s-unknown .status .sd{ background:var(--idle); }
  .subline { margin-top:6px; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--fg-faint); letter-spacing:.04em; }
  .subline .type { text-transform:uppercase; letter-spacing:.1em; } .subline .sep { opacity:.5; }
  .preview { margin-top:8px; font-size:15px; color:var(--fg-dim); display:flex; gap:8px; align-items:baseline; white-space:nowrap; overflow:hidden; }
  .preview .glyph { flex:none; color:var(--fg-faint); font-weight:700; }
  .preview .txt { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card.s-wait .preview, .card.s-wait .preview .glyph { color:var(--wait); }
  .card.s-work .preview .txt { color:var(--work); }
  .card.focused { border-color:var(--accent); background:var(--surface-2); transform:translateX(3px); box-shadow:0 0 0 1px var(--accent), 0 8px 30px rgba(0,0,0,.5), -2px 0 24px rgba(148,224,178,.12); }
  .card.focused.s-wait { border-color:var(--wait); box-shadow:0 0 0 1px var(--wait), 0 8px 30px rgba(0,0,0,.5), -2px 0 26px rgba(255,180,84,.22); }
  .card .cursor { position:absolute; left:-1px; top:50%; transform:translateY(-50%) scaleX(0); transform-origin:left; color:var(--accent); font-size:20px; font-weight:700; opacity:0; transition:transform .14s ease,opacity .14s ease; }
  .card.focused.s-wait .cursor { color:var(--wait); }
  .card.focused .cursor { transform:translateY(-50%) scaleX(1); opacity:1; }
  /* Maestro(t-maestro):紫罗兰专属,与状态色无关 —— 每 host pin 在首位 */
  .card.t-maestro .rail { background:var(--maestro); box-shadow:0 0 14px rgba(187,154,247,.5); }
  .card.t-maestro .ticon i { border-color:var(--maestro); box-shadow:inset 0 0 0 1px rgba(187,154,247,.3); }
  .card.t-maestro .status { color:var(--maestro); background:rgba(187,154,247,.12); }
  .card.t-maestro .status .sd { background:var(--maestro); box-shadow:0 0 8px rgba(187,154,247,.6); }
  .card.t-maestro.focused { border-color:var(--maestro); box-shadow:0 0 0 1px var(--maestro), 0 8px 30px rgba(0,0,0,.5), -2px 0 24px rgba(187,154,247,.22); }
  .card.t-maestro.focused .cursor { color:var(--maestro); }
  .card.opening { animation:flash .3s ease; }

  /* ============ 终端视图 ============ */
  #view-term { background:#11131a; display:flex; flex-direction:column; }
  #term-bar { flex:none; display:flex; align-items:center; gap:10px; padding:11px 16px; border-bottom:1px solid var(--line); background:rgba(22,25,34,.6); font-size:14px; }
  #term-bar .tproj { color:var(--accent); font-weight:700; letter-spacing:.02em; }
  #term-bar .tproj::before { content:"▌ "; color:var(--accent); }
  #term-bar .ttype { color:var(--fg-faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase; }
  #term-wrap { flex:1; position:relative; }
  #term { position:absolute; inset:0; padding:8px; }
  .xterm-viewport { background-color:transparent !important; }
  /* overlay 锚在 #view-term(position:absolute;inset:0 of #views)内 → bottom 是内容区底边 = 键盘顶边,永不压键盘。物理键盘时键盘隐藏、内容区撑满,位置同样正确 */
  #voice-overlay { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(20,22,30,.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); padding:16px 24px; border-radius:12px; color:#e6e6e6; min-width:360px; max-width:80vw; box-shadow:0 10px 40px rgba(0,0,0,.5); display:none; z-index:100; font-size:14px; }
  #overlay-text { margin-top:8px; color:#94e0b2; word-break:break-word; }
  #overlay-hint { margin-top:12px; font-size:12px; color:#888; }
  /* 纠错中(issue #16):状态行转圈 spinner + 原文灰显(待替换)。普通态由 showOverlay 复位 */
  #overlay-status .spin { display:inline-block; width:11px; height:11px; margin-left:6px; vertical-align:-1px; border:2px solid rgba(255,255,255,.25); border-top-color:#94e0b2; border-radius:50%; animation:ov-spin .7s linear infinite; }
  @keyframes ov-spin { to { transform:rotate(360deg); } }
  #voice-overlay.correcting #overlay-text { color:#888; }

  /* ============ 自绘虚拟键盘(v3:一行,列表+终端共用,固定高度)============ */
  /* 键盘条 = body flex 子元素(非 fixed)→ 占据布局高度,#views 自动缩,overlay/scroll 永不被压 */
  #vkeyboard { flex:none; z-index:20; display:flex; gap:6px;
    padding:8px 12px; background:linear-gradient(0deg, var(--bg) 70%, rgba(13,15,22,.9)); border-top:1px solid var(--line); }
  #vkeyboard[hidden] { display:none; }
  /* 等宽填满整行:flex:1 1 0 + min-width:0,任意屏宽都保证单行 */
  .kc { flex:1 1 0; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    height:58px; padding:0 4px; border-radius:11px; background:var(--surface-2); border:1px solid var(--line);
    color:var(--fg); font-family:var(--mono); cursor:pointer; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
    transition:transform .08s, background .12s, border-color .12s, opacity .15s; }
  .kc.sys { background:rgba(123,162,247,.08); border-color:rgba(123,162,247,.32); }
  .kc.sys .kl { color:#7aa2f7; }
  .kc:active, .kc.held { transform:translateY(1px); background:#222838; border-color:var(--accent); }
  .kc .kl { font-size:19px; font-weight:700; line-height:1; }
  .kc .ks { font-size:9px; color:var(--fg-dim); letter-spacing:.04em; text-transform:uppercase; white-space:nowrap; }
  /* 列表态:终端专用键(Esc/Tab/删词/^C/语音)无意义 → 淡化,留方向/Enter/返回高亮 */
  body.ctx-list .kc.term-only { opacity:.3; }
  .kc.voice { background:rgba(148,224,178,.08); border-color:rgba(148,224,178,.35); }
  .kc.voice .kl { color:var(--accent); }
  .kc.voice.held { background:rgba(255,180,84,.18); border-color:var(--wait); }
  .kc.voice.held .kl { color:var(--wait); }
  /* slim hint:仅在接了外接物理键盘(虚拟键盘隐藏)时占位 */
  #hint-footer { flex:none; z-index:20; padding:11px 20px; background:linear-gradient(0deg, var(--bg) 60%, rgba(13,15,22,.6)); border-top:1px solid var(--line); display:flex; gap:20px; align-items:center; font-size:13px; color:var(--fg-faint); letter-spacing:.05em; }
  #hint-footer[hidden] { display:none; }
  #hint-footer .k { color:var(--bg); background:var(--fg-dim); border-radius:5px; padding:2px 8px; font-weight:700; font-size:12px; margin-right:5px; }
  #hint-footer .spacer { flex:1; }

  /* 响应式虚拟键盘行数(SPEC §6.1):横屏 1 行(默认上面的样式)/ 竖屏 2 行。
     只加 portrait 媒体查询 → 横屏样式一字不动;Android 锁横屏永远命中默认 1 行分支,无可见影响。
     竖屏靠 flex-wrap + 每键 1/6 宽 → 12 键自然折成 6+6 两行。 */
  @media (orientation: portrait) {
    #vkeyboard { flex-wrap:wrap; }
    .kc { flex:1 1 calc(100% / 6 - 6px); height:52px; }
  }

  @keyframes rise { to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
  @keyframes railpulse { 0%,100%{ box-shadow:0 0 16px var(--wait); } 50%{ box-shadow:0 0 4px var(--wait); } }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes flash { 50% { background:rgba(148,224,178,.18); } }
</style>
</head>
<body>
  <!-- #views:占满键盘以上的全部高度,两视图绝对定位叠放 -->
  <div id="views">
    <!-- 列表视图 -->
    <div id="view-list" class="view">
      <main id="list"></main>
    </div>

    <!-- 终端视图(顶栏只剩项目名/类型,返回靠键盘 ⌂ + 硬件 BACK)-->
    <div id="view-term" class="view" hidden>
      <div id="term-bar">
        <span class="tproj" id="term-proj">—</span>
        <span class="ttype" id="term-type"></span>
      </div>
      <div id="term-wrap"><div id="term"></div></div>
      <div id="voice-overlay">
        <div id="overlay-status">🎤 录音中…</div>
        <div id="overlay-text"></div>
        <div id="overlay-hint">Enter 发送 · Esc 撤销</div>
      </div>
    </div>
  </div>

  <!-- 虚拟键盘(v3):一行 13 键,列表/终端共用;无外接键盘时常驻。键位按 8BitDo Micro 实际映射后续迭代 -->
  <!-- 注:on-screen tap 保留作 dev convenience;生产场景(AR 眼镜)无触摸,靠 8BitDo 物理键映射触发。要严格化删 tap handler 即可 -->
  <div id="vkeyboard">
    <button class="kc sys" data-act="home"><span class="kl">⌂</span><span class="ks">返回</span></button>
    <button class="kc" data-act="left"><span class="kl">←</span></button>
    <button class="kc" data-act="up"><span class="kl">↑</span></button>
    <button class="kc" data-act="down"><span class="kl">↓</span></button>
    <button class="kc" data-act="right"><span class="kl">→</span></button>
    <button class="kc" data-act="enter"><span class="kl">↵</span><span class="ks">Enter</span></button>
    <button class="kc term-only" data-act="esc"><span class="kl">⎋</span><span class="ks">Esc</span></button>
    <button class="kc term-only" data-act="delword" data-repeat><span class="kl">⌫</span><span class="ks">删词</span></button>
    <button class="kc term-only" data-act="tab"><span class="kl">⇥</span><span class="ks">Tab</span></button>
    <button class="kc term-only" data-act="shifttab"><span class="kl">⇧⇥</span><span class="ks">模式</span></button>
    <button class="kc term-only" data-act="ctrlc"><span class="kl">^C</span><span class="ks">中断</span></button>
    <button class="kc voice term-only" data-voice="zh"><span class="kl">🎤</span><span class="ks">语音</span></button>
  </div>
  <div id="hint-footer" hidden>
    <span><span class="k">↑↓</span>导航</span><span><span class="k">↵</span>进入</span><span><span class="k">F1</span>语音</span>
    <span class="spacer"></span><span id="clock"></span>
  </div>

  <script src="xterm.js"></script>
  <script src="addon-fit.js"></script>
  <script src="addon-webgl.js"></script>
  <script src="addon-search.js"></script>
  <script src="addon-unicode11.js"></script>
  <script>
  /* ========== 列表数据 + 渲染 ========== */
  const ICONS = {
    ssh:`<svg viewBox="0 0 24 24" fill="none" stroke="#8b93a7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l5 5-5 5"/><path d="M12 17h8"/></svg>`,
    claude:`<svg viewBox="0 0 24 24" fill="none" stroke="#d98a52" stroke-width="2.2" stroke-linecap="round"><path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4"/></svg>`,
    codex:`<svg viewBox="0 0 24 24" fill="none" stroke="#9ece6a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7l-5 5 5 5M16 7l5 5-5 5"/></svg>`,
    agent:`<svg viewBox="0 0 24 24" fill="none" stroke="#7aa2f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="11" rx="2.5"/><path d="M12 8V4M8.5 13h.01M15.5 13h.01M9 19v2M15 19v2"/></svg>`,
    maestro:`<svg viewBox="0 0 24 24" fill="none" stroke="#bb9af7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V6l10-2v10"/><circle cx="6.5" cy="18" r="2.5"/><circle cx="16.5" cy="14" r="2.5"/></svg>`,
  };
  const TYPE_LABEL = { ssh:'SSH', claude:'Claude Code', codex:'Codex', agent:'Agent', maestro:'Maestro' };
  const STATUS = { work:{cls:'s-work',label:'工作中'}, wait:{cls:'s-wait',label:'等待反馈'}, idle:{cls:'s-idle',label:'未激活'}, offline:{cls:'s-offline',label:'已断开'} };
  const HOSTS = [
    { name:'beam-server', addr:'evan@104.21.x.x', up:true, projects:[
      { name:'xreal-ai-client', type:'claude', status:'work', age:'now', preview:{glyph:'↳', text:'Editing TerminalBridge.kt — wiring channel swap…', cur:true} },
      { name:'term-on-demand',  type:'claude', status:'wait', age:'4m',  preview:{glyph:'?', text:'Proceed with the DB migration on prod? (y/n)'} },
      { name:'api-gateway',     type:'claude', status:'work', age:'now', preview:{glyph:'↳', text:'Running test suite — 142/210 passed…', cur:true} },
      { name:'prod-logs',       type:'ssh',    status:'idle', age:'2h',  preview:null },
    ]},
    { name:'gpu-box', addr:'root@gpu-01.lan', up:true, projects:[
      { name:'model-eval',    type:'claude', status:'wait', age:'1m',  preview:{glyph:'?', text:'Found 3 refactor approaches — which to implement? [1/2/3]'} },
      { name:'data-pipeline', type:'agent',  status:'work', age:'now', preview:{glyph:'↳', text:'Epoch 12/50 · loss 0.0431 · eta 22m', cur:true} },
      { name:'gpu-monitor',   type:'ssh',    status:'idle', age:'5h',  preview:null },
    ]},
    { name:'edge-pi', addr:'pi@home.lan', up:false, projects:[
      { name:'backup-cron', type:'agent',  status:'work',    age:'now', preview:{glyph:'↳', text:'rsync — 2.3GB / 8.1GB transferred…', cur:true} },
      { name:'scraper',     type:'claude', status:'idle',    age:'1d',  preview:{glyph:'·', text:'session not started'} },
      { name:'home-assist', type:'ssh',    status:'offline', age:'3d',  preview:null },
    ]},
  ];
  const flat = [];
  function esc(s){ return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  // 状态时长:since=服务端进入该状态的 Unix 秒。假设两端 NTP 同步;<1m 或 异常(<0 / >24h)→ 不显示。
  function ageText(p){ if(!p.since) return ''; const m=Math.floor((Date.now()/1000 - p.since)/60);
    if(m<0||m>1440) return ''; return m<1?'':(m<60?m+'m':Math.floor(m/60)+'h'); }
  // 单一真相源:卡片状态徽章 = {cls, label, show}。loading > hooks 实时 state > 旧 status 兜底。
  function statusFor(p){
    if(p.loading) return {cls:'s-loading', label:'加载中', show:true};
    const s=p.state, A=ageText(p);           // hooks 实时态(working/waiting/disconnected/needs-permission/unknown)
    if(s==='working') return {cls:'s-working', label:(A?A+' ':'')+'working', show:true};
    if(s==='waiting')  return {cls:'s-waiting', label:(A?A+' ':'')+'waiting', show:true};
    if(s==='needs-permission') return {cls:'s-waiting', label:'需确认', show:true};
    if(s==='disconnected') return {cls:'s-disc', label:'offline', show:true};
    if(s==='unknown')  return {cls:'s-unknown', label:'', show:false};   // 不清楚 → 不显示徽章
    // 无 state(seed/未探测):保留旧逻辑
    if(p.type==='maestro') return {cls:'', label:'on duty', show:true};
    const S=STATUS[p.status]; return {cls:S?S.cls:'', label:S?S.label:'', show:!!S&&p.status!=='idle'};
  }
  function render(){
    const list=document.getElementById('list'); let html=''; let idx=0; let delay=0;
    HOSTS.forEach(h=>{
      const proxyBadge = h.proxy ? `<span class="hproxy">🔒 ${esc(h.proxy)}</span>` : '';
      html+=`<div class="host${h.up?'':' down'}"><span class="hconn"></span><span class="hname">${h.name}</span><span class="haddr">${h.addr}</span>${proxyBadge}<span class="hline"></span></div>`;
      html+=`<div class="cards">`;
      // Maestro(type=maestro)pin 到 host 首位;其余保持原序(JS sort 稳定)
      const projects=[...h.projects].sort((a,b)=>(b.type==='maestro'?1:0)-(a.type==='maestro'?1:0));
      projects.forEach(p=>{
        const st = statusFor(p);
        const statusHtml = st.show ? `<span class="status"><span class="sd"></span><span class="slabel">${esc(st.label)}</span></span>` : '';
        const pv = p.preview ? `<div class="preview"><span class="glyph">${p.preview.glyph}</span><span class="txt ${p.preview.cur?'cur':''}">${esc(p.preview.text)}</span></div>` : '';
        html+=`<div class="card ${st.cls} t-${p.type}" data-idx="${idx}" data-host="${esc(h.name)}" data-session="${esc(p.session||p.name)}" style="animation-delay:${delay}ms">
          <span class="cursor">▸</span><span class="rail"></span>
          <span class="ticon"><i>${ICONS[p.type]}</i></span>
          <div class="cbody">
            <div class="topline"><span class="name">${esc(p.name)}</span>${statusHtml}</div>
            <div class="subline"><span class="type">${TYPE_LABEL[p.type]}</span>${p.age?`<span class="sep">·</span><span class="age">${esc(p.age)}</span>`:''}</div>
            ${pv}
          </div></div>`;
        flat.push({host:h.name,...p}); idx++; delay+=42;
      });
      html+=`</div>`;
    });
    list.innerHTML=html;
  }

  /* ========== 列表键盘导航 ========== */
  let focusIdx=0;
  function setFocus(i){ const cards=[...document.querySelectorAll('.card')]; if(!cards.length)return;
    focusIdx=(i+cards.length)%cards.length; cards.forEach(c=>c.classList.remove('focused'));
    const el=cards[focusIdx]; el.classList.add('focused'); el.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  function openFocused(){ const el=document.querySelectorAll('.card')[focusIdx]; if(!el)return;
    el.classList.add('opening'); const p=flat[focusIdx];
    console.log('[deck] OPEN',JSON.stringify({host:p.host,session:p.session,name:p.name,type:p.type}));
    setTimeout(()=>el.classList.remove('opening'),320);
    // session 为主键(name 可能重复);mock 数据无 session 时回退 name
    if(window.Bridge&&window.Bridge.openProject) window.Bridge.openProject(p.host,p.session||p.name,p.name,p.type);
    else showTerminal(p.name,p.type);  // 无 Bridge(headless 测试)时 JS 自切
  }

  /* ========== 视图切换 ========== */
  let currentView='list';
  window.showTerminal=function(name,type){
    document.getElementById('term-proj').textContent=name||'session';
    document.getElementById('term-type').textContent=type?TYPE_LABEL[type]||'':'';
    document.getElementById('view-list').hidden=true;
    document.getElementById('view-term').hidden=false;
    currentView='term';
    updateBottomBar();
    // 容器现已可见 + 字体就绪 → 首次创建终端(WebGL 图集才会带上字形);之后只 fit+focus
    fontReady.then(()=>{ if(!term) initTerm(); requestAnimationFrame(()=>{ if(!term)return; try{ fitAddon.fit(); }catch(e){} term.focus(); }); });
  };
  window.showList=function(){
    document.getElementById('view-term').hidden=true;
    document.getElementById('view-list').hidden=false;
    currentView='list';
    updateBottomBar();
  };
  window.currentView=function(){ return currentView; };

  /* ========== xterm ========== */
  // 单一 Sarasa Term SC Nerd 子集字体:Latin + 中文 + Nerd/powerline 全有,WebGL 不需回退。
  // 关键(xterm #3280,真机实测):**必须等字体加载完再创建终端**,WebGL 字形图集才会带上
  // CJK/powerline 字形;若在字体就绪前创建,图集缓存空字形,CJK 渲染空白且 clearTextureAtlas 救不回来。
  let term, fitAddon, webglAddon=null;
  function initTerm(){
    term=new Terminal({ fontFamily:"'MesloLGS','SarasaTerm',monospace", fontSize:14, lineHeight:1.2, cursorBlink:true, scrollback:10000,
      allowProposedApi:true,   // unicode11 addon 注册宽度表需要
      theme:{ background:'#11131a', foreground:'#e6e6e6', cursor:'#94e0b2', selectionBackground:'#3a4760' } });
    fitAddon=new FitAddon.FitAddon();
    term.loadAddon(fitAddon); term.loadAddon(new SearchAddon.SearchAddon());
    // Unicode 11 宽度表:让 xterm 把 emoji(如语音 marker 🎤)算 2 列,与远端 tmux+Claude Code(string-width)一致。
    // 否则 xterm 默认 Unicode 6 表把 emoji 算 1 列,光标移动经过 🎤 时两边错位 → 整行显示乱。
    try{ term.loadAddon(new Unicode11Addon.Unicode11Addon()); term.unicode.activeVersion='11'; }catch(e){ console.warn('[xreal] unicode11 不可用',e); }
    term.open(document.getElementById('term'));
    try{ webglAddon=new WebglAddon.WebglAddon(); term.loadAddon(webglAddon); }catch(e){ console.warn('[xreal] WebGL 不可用,回退 DOM',e); }
    term.onData(d=>{ if(window.Bridge&&window.Bridge.onInput) window.Bridge.onInput(btoa(unescape(encodeURIComponent(d)))); });
    term.onResize(({cols,rows})=>{ if(window.Bridge&&window.Bridge.onResize) window.Bridge.onResize(cols,rows); });
    try{ fitAddon.fit(); }catch(e){}
  }
  // 终端推迟到「首次进入终端视图(#term 可见)+ 字体就绪」时创建 —— 见 showTerminal。
  // WebGL 必须在容器可见(有尺寸)+ 字体加载完时 open,否则字形图集建在 0 尺寸/空字体态 → 全空白。
  const fontReady = (document.fonts&&document.fonts.load)
    ? Promise.all([document.fonts.load("14px 'MesloLGS'"), document.fonts.load("14px 'SarasaTerm'")]).catch(()=>{})
    : Promise.resolve();
  window.writeToTerm=function(b64){ if(!term)return; const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); term.write(u); };
  // 热切 channel 后由 Kotlin 调:把当前 xterm 尺寸重新推给新通道(否则刚连上的 SSH PTY 停在初始 80x24)
  window.syncSize=function(){ if(!term)return; try{ fitAddon.fit(); }catch(e){} if(window.Bridge&&window.Bridge.onResize) window.Bridge.onResize(term.cols, term.rows); };
  window.showOverlay=function(s,t){ var o=document.getElementById('voice-overlay'); o.classList.remove('correcting'); document.getElementById('overlay-status').innerText=s||''; document.getElementById('overlay-text').innerText=t||''; document.getElementById('overlay-hint').innerText='Enter 发送 · Esc 撤销'; o.style.display='block'; };
  /* 纠错中(issue #16):状态行转圈(纯 CSS .spin 动画)+ 原文灰显(.correcting)+ 提示改"稍候"。普通态由 showOverlay 复位 */
  window.showOverlayCorrecting=function(t){ var o=document.getElementById('voice-overlay'); document.getElementById('overlay-status').innerHTML='✨ AI 纠错中 <span class="spin"></span>'; document.getElementById('overlay-text').innerText=t||''; document.getElementById('overlay-hint').innerText='稍候…别急着按 Enter'; o.classList.add('correcting'); o.style.display='block'; };
  window.hideOverlay=function(){ document.getElementById('voice-overlay').style.display='none'; };

  /* 方向键导航:按卡片**真实像素位置**找该方向最近的一张(列表是多列网格 + 每 host 各自一块网格 +
     末行不满,纯线性 ±1 会"跳到右边而非下面"。用几何最近邻才贴合物理位置)。 */
  function move(dir){
    const cards=[...document.querySelectorAll('.card')]; if(!cards.length) return;
    const cur=cards[focusIdx]||cards[0], cr=cur.getBoundingClientRect();
    const cx=cr.left+cr.width/2, cy=cr.top+cr.height/2;
    let best=-1, bestScore=Infinity;
    cards.forEach((el,i)=>{
      if(i===focusIdx) return;
      const r=el.getBoundingClientRect(), dx=(r.left+r.width/2)-cx, dy=(r.top+r.height/2)-cy;
      let primary, secondary;
      if(dir==='down'){ if(dy<=1) return; primary=dy; secondary=Math.abs(dx); }
      else if(dir==='up'){ if(dy>=-1) return; primary=-dy; secondary=Math.abs(dx); }
      else if(dir==='right'){ if(dx<=1) return; primary=dx; secondary=Math.abs(dy); }
      else { if(dx>=-1) return; primary=-dx; secondary=Math.abs(dy); }   // left
      const score=primary + secondary*2;   // 主方向距离为主、偏移加权 → 同列/同行优先
      if(score<bestScore){ bestScore=score; best=i; }
    });
    if(best>=0) setFocus(best);   // 该方向到边界则原地不动(物理导航不绕回)
  }

  /* ========== 全局键盘:列表态自己处理方向/Enter;终端态交给 xterm ========== */
  document.addEventListener('keydown', e=>{
    if(currentView!=='list') return;  // 终端态:不拦截,xterm/Kotlin 处理
    switch(e.key){
      case 'ArrowDown':  move('down');  e.preventDefault(); break;
      case 'ArrowUp':    move('up');    e.preventDefault(); break;
      case 'ArrowRight': move('right'); e.preventDefault(); break;
      case 'ArrowLeft':  move('left');  e.preventDefault(); break;
      case 'j': setFocus(focusIdx+1); e.preventDefault(); break;   // vim 线性兜底(带绕回)
      case 'k': setFocus(focusIdx-1); e.preventDefault(); break;
      case 'Enter': openFocused(); e.preventDefault(); break;
    }
  });
  // 键盘专用应用:卡片不可点(导航全靠方向键 + Enter)。摒弃触摸,简化交互模型

  window.updateProject=function(host,name,patch){ const i=flat.findIndex(p=>p.host===host&&p.name===name); if(i<0)return; Object.assign(flat[i],patch); const keep=focusIdx; flat.length=0; render(); setFocus(keep); };

  /* Kotlin StatusPoller 每轮整批替换 hosts(真实状态/preview)。空数组 → 保留 mock(headless/演示)。 */
  // 列表"结构"指纹:host + 各 session(顺序)。只有结构变了才全量重建,否则走增量 patch。
  let lastStructKey='';
  function structKey(data){ return data.map(h=>h.name+':'+(h.projects||[]).map(p=>p.session||p.name).join(',')).join('|'); }
  // 增量更新:结构不变时只改变化卡片的 .status 徽章 + class,不重建 list → 不闪、不丢焦点/滚动/动画。
  function patchStatus(data){
    // key 必须 host+session:不同 host 可有同名 session(如各自的 maestro),只用 session 会碰撞
    const byKey={}; document.querySelectorAll('.card').forEach(c=>byKey[c.dataset.host+'␀'+c.dataset.session]=c);
    data.forEach(h=>(h.projects||[]).forEach(p=>{
      const card=byKey[h.name+'␀'+(p.session||p.name)]; if(!card) return;
      const st=statusFor(p);
      card.classList.remove('s-loading','s-working','s-waiting','s-disc','s-unknown','s-work','s-wait','s-idle','s-offline');
      if(st.cls) card.classList.add(st.cls);
      let badge=card.querySelector('.status');
      if(st.show){
        if(!badge){ badge=document.createElement('span'); badge.className='status';
          badge.innerHTML='<span class="sd"></span><span class="slabel"></span>'; card.querySelector('.topline').appendChild(badge); }
        const lab=badge.querySelector('.slabel'); if(lab.textContent!==st.label) lab.textContent=st.label;
      } else if(badge){ badge.remove(); }
    }));
    syncFlat(data);
  }
  // 同步底层数据(HOSTS + flat 原位更新),保持 focusIdx 与 openFocused 取到最新 state/since。
  function syncFlat(data){
    HOSTS.splice(0,HOSTS.length,...data);
    const inc={}; data.forEach(h=>(h.projects||[]).forEach(p=>inc[h.name+' '+(p.session||p.name)]={host:h.name,...p}));
    flat.forEach((p,i)=>{ const n=inc[p.host+' '+(p.session||p.name)]; if(n) flat[i]=n; });
  }
  window.setHosts=function(json){
    let data; try{ data = typeof json==='string'?JSON.parse(json):json; }catch(e){ console.warn('[deck] setHosts bad json',e); return; }
    if(!Array.isArray(data)||!data.length) return;
    const sk=structKey(data);
    if(sk===lastStructKey && document.querySelector('.card')){ patchStatus(data); return; }   // 结构不变 → 增量
    lastStructKey=sk;
    HOSTS.splice(0, HOSTS.length, ...data);
    const keep=focusIdx; flat.length=0; render(); setFocus(keep);
  };

  /* ========== 虚拟键盘 ========== */
  function writeChannel(s){ if(window.Bridge&&window.Bridge.onInput) window.Bridge.onInput(btoa(unescape(encodeURIComponent(s)))); }
  function vkey(a){
    // 返回 home 两个视图都可用
    if(a==='home'){ if(window.Bridge&&window.Bridge.goHome) window.Bridge.goHome(); else showList(); return; }
    if(currentView==='list'){
      if(a==='up'||a==='down'||a==='left'||a==='right') move(a);
      else if(a==='enter') openFocused();
      return;  // 列表态忽略其它键
    }
    // 终端态:方向键 → ANSI;其它 → 控制字节
    switch(a){
      case 'up':    writeChannel('\x1b[A'); break;
      case 'down':  writeChannel('\x1b[B'); break;
      case 'right': writeChannel('\x1b[C'); break;
      case 'left':  writeChannel('\x1b[D'); break;
      case 'enter': if(window.Bridge&&window.Bridge.vkeyEnter) window.Bridge.vkeyEnter(); else writeChannel('\r'); break;
      case 'esc':   if(window.Bridge&&window.Bridge.vkeyEsc) window.Bridge.vkeyEsc(); else writeChannel('\x1b'); break;
      case 'tab':      writeChannel('\t'); break;
      case 'shifttab': writeChannel('\x1b[Z'); break;   // back-tab(Claude Code 切换模式)
      case 'delword':  writeChannel('\x17'); break;     // Ctrl+W 删上一个词
      case 'ctrlc':    writeChannel('\x03'); break;     // Ctrl+C 中断
    }
  }
  // 普通键:click 触发。标了 data-repeat 的键(如删词)走"按住连发",不绑 click(避免双触发)。
  document.querySelectorAll('#vkeyboard .kc[data-act]:not([data-repeat])').forEach(b=>b.addEventListener('click',()=>vkey(b.dataset.act)));
  document.querySelectorAll('#vkeyboard .kc[data-repeat]').forEach(b=>{
    let active=false, hold=null, rep=null;
    const stop=()=>{ active=false; clearTimeout(hold); clearInterval(rep); hold=rep=null; };
    const start=e=>{ e.preventDefault(); if(active) return; active=true;
      vkey(b.dataset.act);                                                  // 按下立即一次
      hold=setTimeout(()=>{ rep=setInterval(()=>vkey(b.dataset.act),100); }, 400); };  // 400ms 后 100ms/次 连发
    b.addEventListener('touchstart',start,{passive:false}); b.addEventListener('touchend',stop); b.addEventListener('touchcancel',stop);
    b.addEventListener('mousedown',start); b.addEventListener('mouseup',stop); b.addEventListener('mouseleave',stop);
  });
  document.querySelectorAll('#vkeyboard .kc[data-voice]').forEach(b=>{
    const lang=b.dataset.voice;
    const down=e=>{ e.preventDefault(); b.classList.add('held'); if(window.Bridge&&window.Bridge.voiceDown) window.Bridge.voiceDown(lang); };
    const up=e=>{ e.preventDefault(); if(!b.classList.contains('held'))return; b.classList.remove('held'); if(window.Bridge&&window.Bridge.voiceUp) window.Bridge.voiceUp(lang); };
    b.addEventListener('touchstart',down,{passive:false}); b.addEventListener('touchend',up); b.addEventListener('touchcancel',up);
    b.addEventListener('mousedown',down); b.addEventListener('mouseup',up); b.addEventListener('mouseleave',up);
  });
  let hwkb=false;  // 是否接了外置物理键盘
  function updateBottomBar(){
    // 有外接物理键盘(8BitDo 等)→ 只留 slim hint,全靠物理键 + 语音;
    // 没有 → 常驻一行虚拟键盘(没蓝牙手柄时也能导航/输入)。
    document.getElementById('vkeyboard').hidden=hwkb;
    document.getElementById('hint-footer').hidden=true;   // 不显示提示条(连键盘时底部保持干净)
    // CSS 上下文 class 与 currentView 同步(列表态淡化终端专用键)
    document.body.classList.toggle('ctx-list', currentView==='list');
    document.body.classList.toggle('ctx-term', currentView==='term');
    if(currentView==='term') requestAnimationFrame(()=>{ try{fitAddon.fit();}catch(e){} });
  }
  window.setHwKeyboard=function(present){ hwkb=present; updateBottomBar(); };  // Kotlin 在键盘插拔时调

  function tick(){ document.getElementById('clock').textContent=new Date().toTimeString().slice(0,5); }
  let resizePending=false;
  window.addEventListener('resize',()=>{ if(resizePending)return; resizePending=true; requestAnimationFrame(()=>{ resizePending=false; if(currentView==='term'){ try{ fitAddon.fit(); }catch(e){} } }); });
  render(); setFocus(0); tick(); setInterval(tick,1000);
  hwkb = (window.Bridge&&window.Bridge.hasHardwareKeyboard) ? window.Bridge.hasHardwareKeyboard() : false;
  updateBottomBar();   // 初始列表态:无外接键盘则常驻一行虚拟键盘,有则 slim hint
  console.log('[deck] index.html ready, hwKeyboard='+hwkb);
  </script>
</body>
</html>
